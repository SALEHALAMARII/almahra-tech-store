<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>لوحة التحكم | المهره تك</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <div class="admin-shell">
      <aside class="sidebar">
        <img src="../assets/logo.png" style="width: 150px" /><a
          class="active"
          href="dashboard.html"
          >لوحة التحكم</a
        ><a href="../index.html">عرض الموقع</a
        ><a id="logoutBtn" href="#">تسجيل خروج</a>
      </aside>
      <main class="admin-main">
        <h1>لوحة التحكم</h1>
        <div class="grid stats">
          <div class="content-card">
            <h3>إجمالي المنتجات</h3>
            <strong id="totalProducts">0</strong>
          </div>
          <div class="content-card">
            <h3>إجمالي الأقسام</h3>
            <strong id="totalCategories">4</strong>
          </div>
          <div class="content-card">
            <h3>آخر نشاط</h3>
            <strong>إدارة المنتجات</strong>
          </div>
        </div>
        <section class="section">
          <div class="content-card">
            <h2>إضافة / تعديل منتج</h2>
            <form id="productForm" class="form-grid">
              <input type="hidden" id="productId" />
              <div class="field">
                <label>اسم المنتج</label><input id="name" required />
              </div>
              <div class="field">
                <label>القسم</label
                ><select id="category">
                  <option>الشبكات</option>
                  <option>الكاميرات</option>
                  <option>الكمبيوتر</option>
                  <option>الطابعات</option>
                </select>
              </div>
              <div class="field">
                <label>السعر اختياري</label
                ><input id="price" type="number" min="0" />
              </div>
              <div class="field">
                <label>الحالة</label
                ><select id="available">
                  <option value="true">متوفر</option>
                  <option value="false">غير متوفر</option>
                </select>
              </div>
              <div class="field">
                <label>الوصف</label><textarea id="description"></textarea>
              </div>
              <div class="field">
                <label>المواصفات الفنية</label><textarea id="specs"></textarea>
              </div>
              <div class="field">
                <label>صورة المنتج</label
                ><input id="images" type="file" accept="image/*" /><small
                  >يمكن لصاحب المتجر اختيار الصورة مباشرة من الجوال أو
                  الكمبيوتر.</small
                >
              </div>
              <button class="btn btn-primary">حفظ المنتج</button>
            </form>
          </div>
        </section>
        <section>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>الصوره</th>
                  <th>المنتج</th>
                  <th>القسم</th>
                  <th>السعر</th>
                  <th>الحالة</th>
                  <th>إجراءات</th>
                </tr>
              </thead>
              <tbody id="productsTable"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="../js/pages/admin-dashboard.js"></script>
  </body>
</html>
