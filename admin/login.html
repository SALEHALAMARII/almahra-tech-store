<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>دخول الإدارة | المهره تك</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body class="login-page">
    <div class="login-card">
      <img
        src="../assets/logo.svg"
        alt="logo"
        style="width: 150px; margin: auto"
      />
      <h1>دخول الإدارة</h1>
      <a
        class="btn btn-dark"
        href="../index.html"
        style="display: inline-block; margin: 0 0 16px"
        >← الرجوع إلى الرئيسية</a
      >
      <p>سجّل الدخول بحساب الإدارة الخاص بالمتجر.</p>
      <form id="loginForm" class="grid">
        <div class="field">
          <label>البريد الإلكتروني</label
          ><input id="email" type="email" required />
        </div>
        <div class="field">
          <label>كلمة المرور</label
          ><input id="password" type="password" required />
        </div>
        <button class="btn btn-primary">دخول</button>
        <p id="loginMsg"></p>
      </form>
    </div>
    <script type="module" src="../js/pages/admin-login.js"></script>
  </body>
</html>
